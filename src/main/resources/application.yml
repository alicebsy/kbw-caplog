spring:
  application:
    name: caplog
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
      enabled: true

  datasource:
    url: jdbc:mysql://localhost:3306/caplog?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8
    # 로컬 MySQL 계정이 다르면 환경변수로 지정: export SPRING_DATASOURCE_USERNAME=root SPRING_DATASOURCE_PASSWORD=비밀번호
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
    org.springframework.web: DEBUG
    org.springframework.http.converter: DEBUG
server:
  port: 8080

# API base URL (스크린샷 등 리소스 절대 URL 생성용)
app:
  baseUrl: http://localhost:8080

# JWT 설정 (임시 값, 나중에 환경변수로 분리 권장)
jwt:
  secret: "change-this-to-a-long-random-secret-please-please"
  access-hours: 1        # Access 토큰 1시간
  refresh-days: 14       # Refresh 토큰 14일

caplog:
  geocode:
    provider: kakao
    throttleMillis: 250      # 호출 간 최소 간격(밀리초)
    maxAttempts: 3           # 재시도 상한

kakao:
  restApiKey: ${KAKAO_REST_API_KEY:}  # 환경변수로 주입
  geocode-url: https://dapi.kakao.com/v2/local/search/address.json